<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>YouTube</title>
    <link rel="icon" href="https://www.youtube.com/favicon.ico" />
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ═══════════════════ HEADER ═══════════════════ -->
    <header>
        <div class="hd-left">
            <button class="icon-btn" title="Menu">
                <svg height="24" width="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z" />
                </svg>
            </button>

            <!-- YouTube Official Logo from Google -->
            <a class="yt-logo" href="https://www.youtube.com/" title="YouTube Home" target="_blank">
                <img src="https://www.gstatic.com/youtube/img/branding/youtubelogo/svg/youtubelogo.svg" alt="YouTube"
                    height="20"
                    onerror="this.style.display='none';document.getElementById('yt-fallback').style.display='flex';" />
                <!-- Fallback logo if gstatic fails -->
                <span id="yt-fallback" style="display:none;align-items:center;gap:5px;">
                    <svg height="20" width="20" viewBox="0 0 24 24">
                        <path fill="#FF0000"
                            d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1C4.5 20.5 12 20.5 12 20.5s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8z" />
                        <polygon fill="#fff" points="9.75,15.5 15.75,12 9.75,8.5" />
                    </svg>
                    <span class="yt-logo-text">YouTube</span>
                </span>
            </a>
        </div>

        <div class="hd-center">
            <div class="search-wrap">
                <input type="text" placeholder="Search" id="searchInput" />
                <button class="search-btn" title="Search">
                    <svg height="20" width="20" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M20.87 20.17l-5.59-5.59A7.96 7.96 0 0018 9c0-4.42-3.58-8-8-8S2 4.58 2 9s3.58 8 8 8c1.95 0 3.73-.7 5.12-1.84l5.59 5.59.16-.58zM4 9c0-3.31 2.69-6 6-6s6 2.69 6 6-2.69 6-6 6-6-2.69-6-6z" />
                    </svg>
                </button>
            </div>
            <button class="mic-btn" title="Search with your voice">
                <svg height="20" width="20" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z" />
                </svg>
            </button>
        </div>

        <div class="hd-right">
            <button class="create-btn" title="Create">
                <svg height="20" width="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />
                </svg>
                Create
            </button>
            <button class="icon-btn" title="Notifications">
                <svg height="22" width="22" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z" />
                </svg>
            </button>
            <div class="avatar" title="Account">A</div>
        </div>
    </header>

    <!-- ═══════════════════ SIDEBAR ═══════════════════ -->
    <aside>
        <a class="nav-item active" href="https://www.youtube.com/" title="Home" target="_blank">
            <svg height="24" width="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
            </svg>
            <span>Home</span>
        </a>

        <a class="nav-item" href="https://www.youtube.com/shorts/" title="Shorts" target="_blank">
            <svg height="24" width="24" viewBox="0 0 24 24" fill="currentColor">
                <path
                    d="M17.77 10.32l-1.2-.5L18 9.06c1.84-.96 2.53-3.23 1.56-5.06s-3.23-2.53-5.06-1.56L6 6.94c-1.29.68-2.06 2.04-2 3.49.06 1.45.94 2.73 2.28 3.3l1.2.5L6 14.94c-1.84.96-2.53 3.23-1.56 5.06.97 1.83 3.23 2.53 5.06 1.56l8.5-4.5c1.29-.68 2.06-2.04 2-3.49-.06-1.45-.94-2.73-2.23-3.25zM10 14.65v-5.3L15 12l-5 2.65z" />
            </svg>
            <span>Shorts</span>
        </a>

        <a class="nav-item" href="https://www.youtube.com/feed/subscriptions" title="Subscriptions" target="_blank">
            <svg height="24" width="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M10 18v-6l5 3-5 3zm7-15H7v1h10V3zm3 3H4v1h16V6zm2 3H2v12h20V9zm-2 10H4v-8h16v8z" />
            </svg>
            <span>Subscriptions</span>
        </a>

        <a class="nav-item" href="https://www.youtube.com/feed/you" title="You" target="_blank">
            <svg height="24" width="24" viewBox="0 0 24 24" fill="currentColor">
                <path
                    d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
            </svg>
            <span>You</span>
        </a>
    </aside>

    <!-- ═══════════════════ CATEGORY BAR ═══════════════════ */-->
    <nav class="cat-bar">
        <ul id="catList">
            <li class="active" onclick="setActive(this)">All</li>
            <li onclick="setActive(this)">Programming</li>
            <li onclick="setActive(this)">Data Structures</li>
            <li onclick="setActive(this)">Web Dev</li>
            <li onclick="setActive(this)">Python</li>
            <li onclick="setActive(this)">C++</li>
            <li onclick="setActive(this)">DSA</li>
            <li onclick="setActive(this)">AI & ML</li>
            <li onclick="setActive(this)">System Design</li>
            <li onclick="setActive(this)">Competitive Programming</li>
            <li onclick="setActive(this)">OS</li>
            <li onclick="setActive(this)">Hindi Tutorials</li>
            <li onclick="setActive(this)">English Tutorials</li>
            <li onclick="setActive(this)">Interview Prep</li>
            <li onclick="setActive(this)">Projects</li>
            <li onclick="setActive(this)">Linux</li>
        </ul>
    </nav>

    <!-- ═══════════════════ VIDEO GRID ═══════════════════ -->
    <main class="videos" id="videoGrid"></main>

    <script src="YouTubeClone.js"></script>
</body>

</html>
